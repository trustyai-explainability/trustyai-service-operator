apiVersion: v1
kind: ConfigMap
metadata:
  name: evalhub-provider-lm-evaluation-harness
  labels:
    trustyai.opendatahub.io/evalhub-provider-type: system
    trustyai.opendatahub.io/evalhub-provider-name: lm-evaluation-harness
data:
  lm_evaluation_harness.yaml: |
    id: lm_evaluation_harness
    name: LM Evaluation Harness
    title: LM Evaluation Harness
    description: 'Comprehensive evaluation framework for language models with 180 benchmarks

      '
    runtime:
      k8s:
        image: $(lmes-pod-image)
        entrypoint:
        - /opt/app-root/bin/python
        - /opt/app-root/src/main.py
        cpu_request: 100m
        memory_request: 128Mi
        cpu_limit: 500m
        memory_limit: 4Gi
        env:
        - name: VAR_NAME
          value: VALUE
      local:
        command: 'true'
    benchmarks:
    - id: arc_easy
      name: Basic science Q&A
      description: Grade-school science questions testing basic reasoning and scientific knowledge (AI2 Reasoning Challenge, easy
        split).
      category: reasoning
      metrics:
      - acc
      - acc_norm
      num_few_shot: 0
      dataset_size: 2376
      tags:
      - reasoning
      - science
      - lm_eval
      primary_score:
        metric: acc_norm
        lower_is_better: false
      pass_criteria:
        threshold: 0.25
    - id: AraDiCE_boolq_lev
      name: Yes/no question answering (Levantine Arabic)
      description: Boolean question answering in Levantine Arabic dialect.
      category: general
      metrics:
      - acc
      num_few_shot: 0
      dataset_size: 3270
      tags:
      - general
      - lm_eval
      primary_score:
        metric: acc
        lower_is_better: false
      pass_criteria:
        threshold: 0.25
    - id: blimp
      name: Grammar & syntax judgment
      description: Tests whether models distinguish grammatical from ungrammatical sentences across syntax, morphology, and semantics.
      category: general
      metrics:
      - acc
      num_few_shot: 0
      dataset_size: 1000
      tags:
      - general
      - lm_eval
