---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

components:
  - ../../components/evalhub

patches:
  - target:
      kind: Deployment
      name: controller-manager
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--enable-services"
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "EVALHUB"
