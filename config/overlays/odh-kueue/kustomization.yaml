---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

components:
  - ../../components/tas
  - ../../components/lmes
  - ../../components/job-mgr

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: trustyai

namePrefix: trustyai-service-operator-

patches:
  - target:
      kind: Deployment
      name: controller-manager
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--enable-services"
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "TAS,LMES,JOB_MGR"

configMapGenerator:
  - env: params.env
    behavior: merge
    name: config
