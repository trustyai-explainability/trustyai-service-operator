apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trustyai-service-operator-manager-role
  labels:
    {{- include "trustyai.labels" . | nindent 4 }}
rules:
  # Module CR (components.platform.opendatahub.io)
  - apiGroups: ["components.platform.opendatahub.io"]
    resources: ["trustyais"]
    verbs: [get, list, watch, update, patch]
  - apiGroups: ["components.platform.opendatahub.io"]
    resources: ["trustyais/status"]
    verbs: [get, update, patch]
  - apiGroups: ["components.platform.opendatahub.io"]
    resources: ["trustyais/finalizers"]
    verbs: [update]
  # TrustyAIService
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [trustyaiservices]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [trustyaiservices/status]
    verbs: [get, update, patch]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [trustyaiservices/finalizers]
    verbs: [update]
  # EvalHub
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [evalhubs, evalhubs/proxy]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [evalhubs/status]
    verbs: [get, update, patch]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [evalhubs/finalizers]
    verbs: [update]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [status-events]
    verbs: [create]
  # LMEvalJob
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [lmevaljobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [lmevaljobs/status]
    verbs: [get, update, patch]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [lmevaljobs/finalizers]
    verbs: [update]
  # GuardrailsOrchestrator
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [guardrailsorchestrators]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [guardrailsorchestrators/status]
    verbs: [get, update, patch]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [guardrailsorchestrators/finalizers]
    verbs: [update]
  # NemoGuardrails
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [nemoguardrails]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [nemoguardrails/status]
    verbs: [get, update, patch]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: [nemoguardrails/finalizers]
    verbs: [update]
  # Core resources
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["apps"]
    resources: [deployments/status, deployments/finalizers]
    verbs: [get, update, patch]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [get, list, watch, create, update, delete]
  - apiGroups: [""]
    resources: [persistentvolumes]
    verbs: [list, get, watch]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch, update]
  # RBAC
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [clusterrolebindings]
    verbs: [get, list, watch, create, update, delete]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [rolebindings]
    verbs: [get, list, watch, create, update, patch, delete]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, create, update]
  # Auth (kube-rbac-proxy)
  - apiGroups: ["authentication.k8s.io"]
    resources: [tokenreviews]
    verbs: [create]
  - apiGroups: ["authorization.k8s.io"]
    resources: [subjectaccessreviews]
    verbs: [create]
  # Monitoring
  - apiGroups: ["monitoring.coreos.com"]
    resources: [servicemonitors]
    verbs: [get, list, watch, create, update]
  # OpenShift Routes
  - apiGroups: ["route.openshift.io"]
    resources: [routes]
    verbs: [get, list, watch, create, update, patch, delete]
  # KServe (optional)
  - apiGroups: ["serving.kserve.io"]
    resources: [inferenceservices]
    verbs: [get, list, watch, update, patch]
  - apiGroups: ["serving.kserve.io"]
    resources: [inferenceservices/finalizers]
    verbs: [get, list, watch, update, patch, delete]
  - apiGroups: ["serving.kserve.io"]
    resources: [servingruntimes]
    verbs: [get, list, watch]
  # Istio (optional)
  - apiGroups: ["networking.istio.io"]
    resources: [destinationrules, virtualservices]
    verbs: [get, list, watch, create, update, patch, delete]
  # CRD discovery
  - apiGroups: ["apiextensions.k8s.io"]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  # Kueue (optional)
  - apiGroups: ["kueue.x-k8s.io"]
    resources: [workloads]
    verbs: [get, list, watch, patch]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: [workloads/status]
    verbs: [get, update, patch]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: [workloads/finalizers]
    verbs: [update]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: [resourceflavors, workloadpriorityclasses]
    verbs: [get, list, watch]
  - apiGroups: ["scheduling.k8s.io"]
    resources: [priorityclasses]
    verbs: [get, list, watch]
  # Batch (Kueue job lookup)
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [get]
