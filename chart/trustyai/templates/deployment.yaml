apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustyai-service-operator-controller-manager
  namespace: {{ .Values.operatorNamespace }}
  labels:
    {{- include "trustyai.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "trustyai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- include "trustyai.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: {{ .Values.operator.image }}
          command:
            - /manager
          args:
            - --leader-elect
            - --enable-services
            - {{ .Values.enabledServices }}
            - --configmap
            - trustyai-service-operator-config
          env:
            - name: GOMEMLIMIT
              value: "630MiB"
            - name: APPLICATIONS_NAMESPACE
              value: {{ .Values.operatorNamespace }}
            {{- range $key, $val := .Values.relatedImages }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
