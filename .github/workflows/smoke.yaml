name: Tier 2 - Smoke test

on:
  pull_request:
    branches:
      - main
      - incubation
      - stable

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || 'default-pr-number' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push operator container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: smoke/operator:pr-${{ github.event.pull_request.number || env.PR_NUMBER }}
          build-args: |
            CI_CONTAINER_VERSION=pr-${{ github.event.pull_request.number || env.PR_NUMBER }}

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:v1.24.17
          cluster_name: kind

      - name: Load the operator image into Kind
        run: |
          kind load docker-image smoke/operator:pr-${{ github.event.pull_request.number || env.PR_NUMBER }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.7.0
          sudo mv kustomize /usr/local/bin/

      - name: Apply external CRDs
        run: |
          kubectl apply -f tests/crds/monitoring.coreos.com_servicemonitors.yaml
          kubectl apply -f tests/crds/route_crd.yaml
          kubectl apply -f tests/crds/serving.kserve.io_inferenceservices.yaml

      - name: Update params.env file
        run: |
          sed -i 's|trustyaiOperatorImage=quay.io/trustyai/trustyai-service-operator:latest|trustyaiOperatorImage=smoke/operator:pr-${{ github.event.pull_request.number || env.PR_NUMBER }}|' config/base/params.env

      - name: Deploy the operator with testing overlay
        run: |
          kubectl create namespace system
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/tls.key -out /tmp/tls.crt -days 1 \
            -subj '/CN=trustyai-service-operator-webhook-service.system.svc' \
            -addext 'subjectAltName=DNS:trustyai-service-operator-webhook-service.system.svc,DNS:trustyai-service-operator-webhook-service.system.svc.cluster.local'
          kubectl create secret tls webhook-server-cert \
            --cert=/tmp/tls.crt --key=/tmp/tls.key -n system
          kustomize build config/overlays/testing | sed 's/imagePullPolicy: Always/imagePullPolicy: IfNotPresent/g' | kubectl apply -n system -f -

      - name: Inject CA bundle into webhook configurations
        run: |
          # Encode the CA bundle (the cert itself for self-signed)
          CA_BUNDLE=$(cat /tmp/tls.crt | base64 -w 0)

          # Patch TrustyAIService CRD if it has a conversion webhook
          if kubectl get crd trustyaiservices.trustyai.opendatahub.io -o jsonpath='{.spec.conversion.strategy}' | grep -q "Webhook"; then
            kubectl patch crd trustyaiservices.trustyai.opendatahub.io --type='json' -p="[{\"op\": \"add\", \"path\": \"/spec/conversion/webhook/clientConfig/caBundle\", \"value\":\"${CA_BUNDLE}\"}]"
            echo "Patched TrustyAIService CRD with CA bundle"
          fi

          # Patch EvalHub CRD if it has a conversion webhook
          if kubectl get crd evalhubs.trustyai.opendatahub.io -o jsonpath='{.spec.conversion.strategy}' 2>/dev/null | grep -q "Webhook"; then
            kubectl patch crd evalhubs.trustyai.opendatahub.io --type='json' -p="[{\"op\": \"add\", \"path\": \"/spec/conversion/webhook/clientConfig/caBundle\", \"value\":\"${CA_BUNDLE}\"}]"
            echo "Patched EvalHub CRD with CA bundle"
          fi

      - name: Wait for operator to be ready
        run: |
          kubectl wait --for=condition=available --timeout=120s \
            deployment/trustyai-service-operator-controller-manager -n system
          echo "Operator deployment is ready"
          kubectl get pods -n system
          kubectl wait --for=condition=ready --timeout=60s \
            pod -l control-plane=trustyai-service-operator -n system
          echo "Operator pod is ready"

      - name: Run smoke tests
        run: ./tests/smoke/test_smoke.sh

env:
  PR_NUMBER: "default-pr-number"
  KUBECONFIG: "${HOME}/.kube/config"
