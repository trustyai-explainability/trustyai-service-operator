kind: Deployment
apiVersion: apps/v1
metadata:
    name: {{ .Orchestrator.Name }}
    namespace: {{ .Orchestrator.Namespace }}
    labels:
        app: {{ .Orchestrator.Name }}
        component: {{ .Orchestrator.Name }}
        deploy-name: {{ .Orchestrator.Name }}
    spec:
        replicas: 1
        selector:
            matchLabels:
                app: {{ .Orchestrator.Name }}
                component: {{ .Orchestrator.Name }}
                deploy-name: {{ .Orchestrator.Name }}
        template:
          metadata:
            labels:
              app: {{ .Orchestrator.Name }}
              component: {{ .Orchestrator.Name }}
              deploy-name: {{ .Orchestrator.Name }}
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            serviceAccountName: "{{ .Orchestrator.Name }}-service-account"
            volumes:
              - name: trustyai-config
                configMap:
                  name: trustyai-config
            containers:
              - resources:
                  limits:
                    cpu: '1'
                    memory: 2Gi
                  requests:
                    cpu: '1'
                    memory: 2Gi
                  readinessProbe:
                    httpGet:
                      path: /health
                      port: 8033
                      scheme: HTTP
                    initialDelaySeconds: 10
                    timeoutSeconds: 10
                    periodSeconds: 20
                    successThreshold: 1
                    failureThreshold: 3
                  terminationMessagePath: /dev/termination-log
                  name: {{ .Orchestrator.Name }}
                  command:
                    - /app/bin/fms-guardrails-orchestr8
                  env:
                    - name: ORCHESTRATOR_CONFIG
                      value: /config/config.yaml
                    - name: HTTP_PORT
                      value: '8033'
                    - name: RUST_BACKTRACE
                      value: 'full'
                    - name: RUST_LOG
                      value: 'fms_guardrails_orchestr8=trace,tower_grpc=debug'
                  securityContext:
                    capabilities:
                      drop:
                        - ALL
                    privileged: false
                    runAsNonRoot: true
                    readOnlyRootFilesystem: true
                    allowPrivilegeEscalation: false
                    seccompProfile:
                      type: RuntimeDefault
                  ports:
                    - name: http
                      containerPort: 8033
                      protocol: TCP
                  imagePullPolicy: Always
                  volumeMounts:
                    - name: fms-orchestr8-config-nlp
                      readOnly: true
                      mountPath: /config/config.yaml
                      subPath: config.yaml
                  terminationMessagePolicy: File
                  image: {{ .Orchestrator.Image }}